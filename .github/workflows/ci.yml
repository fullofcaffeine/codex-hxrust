name: CI

on:
  push: {}
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  HAXE_VERSION: "4.3.7"
  HAXE_RUST_REPOSITORY: fullofcaffeine/haxe.rust

jobs:
  public-readiness:
    name: Public readiness checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout codex-hxrust
        uses: actions/checkout@v6
        with:
          path: codex-hxrust
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        working-directory: codex-hxrust
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Haxe via lix
        working-directory: codex-hxrust
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Install Haxe formatter
        run: haxelib install formatter --quiet

      - name: Check changed Haxe formatting
        working-directory: codex-hxrust
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            npm run format:haxe:changed -- "origin/${{ github.base_ref }}"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            npm run format:haxe:changed -- "${{ github.event.before }}"
          else
            npm run format:haxe:changed -- "HEAD~1"
          fi

  haxe-rust-smoke:
    name: haxe.rust generated Rust smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout codex-hxrust
        uses: actions/checkout@v6
        with:
          path: codex-hxrust

      - name: Checkout haxe.rust sibling
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HAXE_RUST_REPOSITORY }}
          path: haxe.rust
          token: ${{ secrets.HAXE_RUST_CHECKOUT_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        working-directory: codex-hxrust
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Haxe via lix
        working-directory: codex-hxrust
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Check haxe.rust generated Cargo gates
        working-directory: codex-hxrust
        run: npm run test:generated-cargo
