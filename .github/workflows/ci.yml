name: CI

on:
  push: {}
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  HAXE_VERSION: "4.3.7"
  HAXE_RUST_REPOSITORY: fullofcaffeine/haxe.rust

jobs:
  public-readiness:
    name: Public readiness checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout codex-hxrust
        uses: actions/checkout@v6
        with:
          path: codex-hxrust
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        working-directory: codex-hxrust
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Haxe/Neko for formatting
        run: |
          sudo apt-get update
          sudo apt-get install -y haxe neko

      - name: Configure haxelib
        run: |
          set -euo pipefail
          mkdir -p "$HOME/haxelib"
          haxelib setup "$HOME/haxelib"
          haxe -version
          haxelib version

      - name: Install Haxe formatter
        run: haxelib install formatter --quiet

      - name: Check Haxe formatting
        working-directory: codex-hxrust
        env:
          HAXELIB_BIN: /usr/bin/haxelib
          HAXE_FORMATTER_USE_NODE: "1"
        run: npm run format:haxe:check

  haxe-rust-smoke:
    name: haxe.rust generated Rust smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HAXE_RUST_CHECKOUT_TOKEN: ${{ secrets.HAXE_RUST_CHECKOUT_TOKEN }}
    steps:
      - name: Checkout codex-hxrust
        uses: actions/checkout@v6
        with:
          path: codex-hxrust

      - name: Skip note when haxe.rust token is unavailable
        if: env.HAXE_RUST_CHECKOUT_TOKEN == ''
        run: |
          echo "::notice::Skipping generated Rust smoke because HAXE_RUST_CHECKOUT_TOKEN is not configured for the private haxe.rust sibling."
          echo "::notice::Local public-readiness still requires npm run test:generated-cargo before publishing."

      - name: Checkout haxe.rust sibling
        if: env.HAXE_RUST_CHECKOUT_TOKEN != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HAXE_RUST_REPOSITORY }}
          path: haxe.rust
          token: ${{ env.HAXE_RUST_CHECKOUT_TOKEN }}

      - name: Setup Node.js
        if: env.HAXE_RUST_CHECKOUT_TOKEN != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install npm dependencies
        if: env.HAXE_RUST_CHECKOUT_TOKEN != ''
        working-directory: codex-hxrust
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Neko runtime for haxelib
        if: env.HAXE_RUST_CHECKOUT_TOKEN != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y neko

      - name: Install Haxe via lix
        if: env.HAXE_RUST_CHECKOUT_TOKEN != ''
        working-directory: codex-hxrust
        run: |
          set -euo pipefail
          npx lix download
          npx lix download haxe "${{ env.HAXE_VERSION }}"
          npx lix use haxe "${{ env.HAXE_VERSION }}"
          echo "$(pwd)/node_modules/.bin" >> "$GITHUB_PATH"
          export PATH="$(pwd)/node_modules/.bin:$PATH"
          haxe -version

      - name: Check haxe.rust generated Cargo gates
        if: env.HAXE_RUST_CHECKOUT_TOKEN != ''
        working-directory: codex-hxrust
        run: npm run test:generated-cargo
